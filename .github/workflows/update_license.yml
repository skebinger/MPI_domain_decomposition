name: Update License Year

on:
  schedule:
    - cron: "0 0 1 1 *" # January 1st
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_license_year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set current year
        run: echo "CURRENT_YEAR=$(date +'%Y')" >> $GITHUB_ENV

      - name: Update license year ranges
        run: |
          set -e

          echo "Updating copyright years to $CURRENT_YEAR"

          find . \
            -type d \( -name .git -o -name build -o -name vendor -o -name external \) -prune -false \
            -o -type f \( \
              -name "*.sh" -o \
              -name "*.f90" -o \
              -name "*.cmake" -o \
              -name "*.txt" \
            \) -print0 | while IFS= read -r -d '' file; do

              if grep -qE "Copyright \(C\) [0-9]{4}" "$file"; then
                sed -i -E \
                  "s/(Copyright \(C\) ([0-9]{4}))(-[0-9]{4})?/\1-${CURRENT_YEAR}/" \
                  "$file"
              fi

            done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet; then
            git add -u
            git commit -m "Update license year range to ${CURRENT_YEAR}"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No changes needed"
          fi
